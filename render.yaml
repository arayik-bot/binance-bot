services:
  - type: web
    name: binance-trading-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false          # ← Enter manually in Render dashboard
      - key: BINANCE_API_KEY
        sync: false          # ← Enter manually
      - key: BINANCE_SECRET
        sync: false          # ← Enter manually
      - key: ADMIN_IDS
        sync: false          # ← Your Telegram user ID
      - key: USE_TESTNET
        value: "true"        # Change to "false" for LIVE trading
      - key: AUTO_CONFIRM_TIMEOUT
        value: "30"          # Seconds before auto-execute
      - key: PORT
        value: "8080"
