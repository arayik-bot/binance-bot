services:
  - type: web
    name: binance-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALLOWED_USER_IDS
        value: "123456789,987654321"
      - key: MAX_TRADE_SIZE_USD
        value: "500"
      - key: DAILY_LOSS_LIMIT_USD
        value: "1000"
      - key: READ_ONLY_MODE
        value: "False"
