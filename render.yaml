services:
  - type: web
    name: binance-trading-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: ALLOWED_USERS
        sync: false
      - key: DEFAULT_SYMBOL
        value: BTCUSDT
      - key: MAX_TRADE_SIZE_USD
        value: "100"
      - key: DAILY_LOSS_LIMIT_USD
        value: "50"
      - key: READ_ONLY
        value: "false"
      - key: RSI_PERIOD
        value: "14"
      - key: RSI_OVERSOLD
        value: "30"
      - key: RSI_OVERBOUGHT
        value: "70"
      - key: MA_FAST
        value: "9"
      - key: MA_SLOW
        value: "21"
      - key: ALERT_CHECK_INTERVAL
        value: "60"
      - key: STRATEGY_CHECK_INTERVAL
        value: "300"
      - key: FUTURES_LEVERAGE
        value: "1"
